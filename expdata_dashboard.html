<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Experiment Data Dashboard</title>
<style>
:root {
  --bg: #0f1117;
  --surface: #1a1d27;
  --surface2: #242837;
  --border: #2e3348;
  --text: #e1e4ed;
  --text-dim: #8b90a5;
  --accent: #6c8cff;
  --accent2: #4ecdc4;
  --green: #4ade80;
  --red: #f87171;
  --yellow: #fbbf24;
  --orange: #fb923c;
  --purple: #a78bfa;
  --pink: #f472b6;
  --cyan: #22d3ee;
  --radius: 8px;
}
* { margin:0; padding:0; box-sizing:border-box; }
body {
  background: var(--bg);
  color: var(--text);
  font-family: 'SF Mono','Fira Code','Consolas',monospace;
  font-size: 13px;
  line-height: 1.5;
}
::-webkit-scrollbar { width:6px; height:6px; }
::-webkit-scrollbar-track { background:var(--surface); }
::-webkit-scrollbar-thumb { background:var(--border); border-radius:3px; }
::-webkit-scrollbar-thumb:hover { background:var(--text-dim); }

/* Layout */
#app { display:flex; flex-direction:column; height:100vh; }
#topbar {
  display:flex; align-items:center; gap:16px; padding:8px 16px;
  background:var(--surface); border-bottom:1px solid var(--border);
  flex-shrink:0;
}
#topbar h1 { font-size:14px; color:var(--accent); white-space:nowrap; }
.tab-bar { display:flex; gap:2px; }
.tab-btn {
  padding:6px 14px; border:none; background:transparent; color:var(--text-dim);
  cursor:pointer; font:inherit; border-radius:var(--radius) var(--radius) 0 0;
  transition: background 0.15s, color 0.15s;
}
.tab-btn:hover { background:var(--surface2); color:var(--text); }
.tab-btn.active { background:var(--surface2); color:var(--accent); }
#auth-section {
  margin-left:auto; display:flex; align-items:center; gap:8px;
}
#auth-section input {
  background:var(--surface2); border:1px solid var(--border); color:var(--text);
  padding:4px 8px; border-radius:var(--radius); font:inherit; width:200px;
}
#auth-section button, .btn {
  background:var(--accent); color:#fff; border:none; padding:4px 12px;
  border-radius:var(--radius); cursor:pointer; font:inherit;
}
.btn-danger { background:var(--red); }
.btn-sm { padding:2px 8px; font-size:12px; }
.btn:hover { opacity:0.85; }

/* Main content */
#content { flex:1; overflow:auto; padding:16px; }
.panel {
  background:var(--surface); border:1px solid var(--border);
  border-radius:var(--radius); padding:16px; margin-bottom:16px;
}
.panel h2 { font-size:13px; color:var(--accent); margin-bottom:12px; }

/* Tables */
table { width:100%; border-collapse:collapse; }
th, td { padding:6px 10px; text-align:left; border-bottom:1px solid var(--border); }
th { color:var(--text-dim); font-weight:600; position:sticky; top:0; background:var(--surface); }
tr:hover { background:var(--surface2); }
.reward-1 { color:var(--green); font-weight:bold; }
.reward-0 { color:var(--red); }

/* Filters */
.filter-bar {
  display:flex; gap:8px; margin-bottom:12px; flex-wrap:wrap; align-items:center;
}
.filter-bar select, .filter-bar input {
  background:var(--surface2); border:1px solid var(--border); color:var(--text);
  padding:4px 8px; border-radius:var(--radius); font:inherit;
}
.filter-bar label { color:var(--text-dim); font-size:12px; }

/* Stats cards */
.stats-row { display:flex; gap:12px; margin-bottom:16px; flex-wrap:wrap; }
.stat-card {
  background:var(--surface2); border:1px solid var(--border);
  border-radius:var(--radius); padding:12px 16px; min-width:120px;
}
.stat-card .label { color:var(--text-dim); font-size:11px; text-transform:uppercase; }
.stat-card .value { font-size:20px; font-weight:bold; margin-top:2px; }
.stat-card .value.green { color:var(--green); }
.stat-card .value.red { color:var(--red); }
.stat-card .value.accent { color:var(--accent); }

/* Trajectory viewer */
.traj-layout { display:flex; gap:16px; height:calc(100vh - 140px); }
.traj-list {
  width:320px; flex-shrink:0; overflow-y:auto;
  background:var(--surface); border:1px solid var(--border); border-radius:var(--radius);
}
.traj-item {
  padding:8px 12px; cursor:pointer; border-bottom:1px solid var(--border);
  display:flex; justify-content:space-between; align-items:center;
}
.traj-item:hover { background:var(--surface2); }
.traj-item.active { background:var(--surface2); border-left:3px solid var(--accent); }
.traj-item .iid { font-size:12px; color:var(--text); white-space:nowrap; overflow:hidden; text-overflow:ellipsis; max-width:200px; }
.traj-item .meta { font-size:11px; color:var(--text-dim); }
.traj-viewer {
  flex:1; overflow-y:auto; background:var(--surface);
  border:1px solid var(--border); border-radius:var(--radius); padding:16px;
}
.msg { margin-bottom:12px; padding:10px; border-radius:var(--radius); }
.msg-system { background:#1a2332; border-left:3px solid var(--cyan); }
.msg-user { background:#1a2a1a; border-left:3px solid var(--green); }
.msg-assistant { background:#2a1a2a; border-left:3px solid var(--purple); }
.msg-role { font-size:11px; font-weight:bold; text-transform:uppercase; margin-bottom:4px; }
.msg-role.system { color:var(--cyan); }
.msg-role.user { color:var(--green); }
.msg-role.assistant { color:var(--purple); }
.msg-content { white-space:pre-wrap; word-break:break-word; font-size:12px; }

/* Pagination */
.pagination { display:flex; gap:8px; align-items:center; margin-top:12px; }
.pagination button { font:inherit; }

/* Compare */
.compare-row { display:flex; gap:16px; flex-wrap:wrap; }
.compare-card {
  flex:1; min-width:280px; background:var(--surface); border:1px solid var(--border);
  border-radius:var(--radius); padding:16px;
}
.compare-card h3 { color:var(--accent); font-size:13px; margin-bottom:8px; }

/* Loading */
.loading { color:var(--text-dim); padding:20px; text-align:center; }
.error { color:var(--red); padding:10px; }
.hidden { display:none !important; }

/* Badge */
.badge {
  display:inline-block; padding:1px 6px; border-radius:4px; font-size:11px; font-weight:600;
}
.badge-completed { background:#1a3a1a; color:var(--green); }
.badge-created { background:#1a2a3a; color:var(--accent); }
.badge-uploading { background:#3a2a1a; color:var(--yellow); }
.badge-failed { background:#3a1a1a; color:var(--red); }
</style>
</head>
<body>
<div id="app">
  <div id="topbar">
    <h1>expdata</h1>
    <div class="tab-bar">
      <button class="tab-btn active" data-tab="experiments">Experiments</button>
      <button class="tab-btn" data-tab="results">Results</button>
      <button class="tab-btn" data-tab="trajectories">Trajectories</button>
      <button class="tab-btn" data-tab="localization">Localization</button>
    </div>
    <div id="auth-section">
      <input type="text" id="token-input" placeholder="Bearer token..." />
      <button class="btn btn-sm" onclick="saveToken()">Save</button>
    </div>
  </div>

  <div id="content">
    <!-- Experiments Tab -->
    <div id="tab-experiments" class="tab-content">
      <div class="panel">
        <div class="filter-bar">
          <label>Type:</label>
          <select id="exp-filter-type" onchange="loadExperiments()">
            <option value="">All</option>
            <option value="eval">Eval</option>
            <option value="collection">Collection</option>
          </select>
          <label>Status:</label>
          <select id="exp-filter-status" onchange="loadExperiments()">
            <option value="">All</option>
            <option value="created">Created</option>
            <option value="uploading">Uploading</option>
            <option value="completed">Completed</option>
            <option value="failed">Failed</option>
          </select>
          <label>Model:</label>
          <input type="text" id="exp-filter-model" placeholder="Filter model..." onkeyup="debounce(loadExperiments, 300)()" />
          <button class="btn btn-sm" onclick="compareSelected()">Compare Selected</button>
        </div>
        <div id="experiments-table-wrap">
          <table>
            <thead>
              <tr>
                <th style="width:30px"><input type="checkbox" id="select-all" onchange="toggleSelectAll()" /></th>
                <th>ID</th><th>Name</th><th>Type</th><th>Model</th><th>Status</th>
                <th>Created</th><th>Actions</th>
              </tr>
            </thead>
            <tbody id="experiments-tbody"></tbody>
          </table>
        </div>
        <div class="pagination">
          <button class="btn btn-sm" onclick="expPage(-1)">Prev</button>
          <span id="exp-page-info"></span>
          <button class="btn btn-sm" onclick="expPage(1)">Next</button>
        </div>
      </div>
      <div id="compare-section" class="hidden"></div>
    </div>

    <!-- Results Tab -->
    <div id="tab-results" class="tab-content hidden">
      <div class="panel">
        <div class="filter-bar">
          <label>Experiment:</label>
          <select id="res-exp-select" onchange="loadResults()"></select>
          <label>Instance:</label>
          <input type="text" id="res-filter-instance" placeholder="Filter instance..." onkeyup="debounce(loadResults, 300)()" />
          <label>Reward:</label>
          <select id="res-filter-reward" onchange="loadResults()">
            <option value="">All</option>
            <option value="1">Solved (1.0)</option>
            <option value="0">Failed (0.0)</option>
          </select>
        </div>
        <div id="results-stats" class="stats-row"></div>
        <div id="results-table-wrap">
          <table>
            <thead>
              <tr>
                <th>Instance ID</th><th>Repo</th><th>Reward</th>
                <th>Termination</th><th>Sample</th>
              </tr>
            </thead>
            <tbody id="results-tbody"></tbody>
          </table>
        </div>
        <div class="pagination">
          <button class="btn btn-sm" onclick="resPage(-1)">Prev</button>
          <span id="res-page-info"></span>
          <button class="btn btn-sm" onclick="resPage(1)">Next</button>
        </div>
      </div>
    </div>

    <!-- Trajectories Tab -->
    <div id="tab-trajectories" class="tab-content hidden">
      <div class="filter-bar" style="margin-bottom:12px">
        <label>Experiment:</label>
        <select id="traj-exp-select" onchange="loadTrajectories()"></select>
        <label>Instance:</label>
        <input type="text" id="traj-filter-instance" placeholder="Filter..." onkeyup="debounce(loadTrajectories, 300)()" />
      </div>
      <div class="traj-layout">
        <div class="traj-list" id="traj-list"></div>
        <div class="traj-viewer" id="traj-viewer">
          <div class="loading">Select a trajectory from the list</div>
        </div>
      </div>
    </div>

    <!-- Localization Tab -->
    <div id="tab-localization" class="tab-content hidden">
      <div class="panel">
        <div class="filter-bar">
          <label>Experiment:</label>
          <select id="loc-exp-select" onchange="loadLocalization()"></select>
        </div>
        <div id="loc-aggregate" class="stats-row"></div>
        <div id="loc-per-instance">
          <table>
            <thead>
              <tr><th>Instance</th><th>Tracked</th><th>Score</th><th>Details</th></tr>
            </thead>
            <tbody id="loc-tbody"></tbody>
          </table>
        </div>
      </div>
    </div>
  </div>
</div>

<script>
// ---- State ----
let API = '';
let TOKEN = localStorage.getItem('expdata_token') || '';
let experiments = [];
let expOffset = 0;
const EXP_LIMIT = 50;
let resOffset = 0;
const RES_LIMIT = 100;
let trajOffset = 0;
const TRAJ_LIMIT = 50;
let selectedExps = new Set();

// ---- Init ----
document.getElementById('token-input').value = TOKEN;
API = window.location.origin;

function saveToken() {
  TOKEN = document.getElementById('token-input').value.trim();
  localStorage.setItem('expdata_token', TOKEN);
  loadExperiments();
}

function headers() {
  const h = {'Content-Type': 'application/json'};
  if (TOKEN) h['Authorization'] = `Bearer ${TOKEN}`;
  return h;
}

async function api(path, opts = {}) {
  const url = API + path;
  opts.headers = {...headers(), ...(opts.headers || {})};
  const resp = await fetch(url, opts);
  if (!resp.ok) {
    const text = await resp.text();
    throw new Error(`${resp.status}: ${text}`);
  }
  return resp.json();
}

// ---- Debounce ----
function debounce(fn, ms) {
  let timer;
  return function() {
    clearTimeout(timer);
    timer = setTimeout(fn, ms);
  };
}

// ---- Tab switching ----
document.querySelectorAll('.tab-btn').forEach(btn => {
  btn.addEventListener('click', () => {
    document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
    document.querySelectorAll('.tab-content').forEach(c => c.classList.add('hidden'));
    btn.classList.add('active');
    document.getElementById('tab-' + btn.dataset.tab).classList.remove('hidden');

    if (btn.dataset.tab === 'results') populateExpSelect('res-exp-select', 'eval');
    if (btn.dataset.tab === 'trajectories') populateExpSelect('traj-exp-select');
    if (btn.dataset.tab === 'localization') populateExpSelect('loc-exp-select', 'eval');
  });
});

// ---- Experiments ----
async function loadExperiments() {
  try {
    const type = document.getElementById('exp-filter-type').value;
    const status = document.getElementById('exp-filter-status').value;
    const model = document.getElementById('exp-filter-model').value;
    let qs = `?limit=${EXP_LIMIT}&offset=${expOffset}`;
    if (type) qs += `&type=${type}`;
    if (status) qs += `&status=${status}`;
    if (model) qs += `&model=${encodeURIComponent(model)}`;
    const data = await api('/api/v1/experiments' + qs);
    experiments = data.experiments;
    renderExperiments();
  } catch(e) {
    document.getElementById('experiments-tbody').innerHTML =
      `<tr><td colspan="8" class="error">${e.message}</td></tr>`;
  }
}

function renderExperiments() {
  const tbody = document.getElementById('experiments-tbody');
  tbody.innerHTML = experiments.map(exp => `
    <tr>
      <td><input type="checkbox" class="exp-check" value="${exp.id}"
        ${selectedExps.has(exp.id) ? 'checked' : ''}
        onchange="toggleExpSelect(${exp.id}, this.checked)" /></td>
      <td>${exp.id}</td>
      <td>${esc(exp.name)}</td>
      <td>${exp.type}</td>
      <td>${esc(exp.model || '-')}</td>
      <td><span class="badge badge-${exp.status}">${exp.status}</span></td>
      <td>${formatDate(exp.created_at)}</td>
      <td>
        <button class="btn btn-sm" onclick="viewExperiment(${exp.id})">View</button>
        <button class="btn btn-sm btn-danger" onclick="deleteExperiment(${exp.id})">Del</button>
      </td>
    </tr>
  `).join('');
  document.getElementById('exp-page-info').textContent =
    `Showing ${expOffset + 1}-${expOffset + experiments.length}`;
}

function expPage(dir) {
  expOffset = Math.max(0, expOffset + dir * EXP_LIMIT);
  loadExperiments();
}

function toggleSelectAll() {
  const checked = document.getElementById('select-all').checked;
  document.querySelectorAll('.exp-check').forEach(cb => {
    cb.checked = checked;
    toggleExpSelect(parseInt(cb.value), checked);
  });
}

function toggleExpSelect(id, checked) {
  if (checked) selectedExps.add(id);
  else selectedExps.delete(id);
}

async function viewExperiment(id) {
  try {
    const exp = await api(`/api/v1/experiments/${id}`);
    const summary = exp.summary_json ? JSON.parse(exp.summary_json) : {};
    alert(
      `Experiment #${id}: ${exp.name}\n` +
      `Type: ${exp.type} | Model: ${exp.model || '-'}\n` +
      `Status: ${exp.status}\n` +
      `Results: ${exp.eval_results_count} | Trajectories: ${exp.trajectories_count}\n` +
      `Traces: ${exp.fault_traces_count} | Test Outputs: ${exp.test_outputs_count}\n` +
      (summary.solve_rate != null ? `Solve Rate: ${(summary.solve_rate * 100).toFixed(1)}%` : '')
    );
  } catch(e) { alert('Error: ' + e.message); }
}

async function deleteExperiment(id) {
  if (!confirm(`Delete experiment #${id}? This cannot be undone.`)) return;
  try {
    await api(`/api/v1/experiments/${id}`, {method: 'DELETE'});
    loadExperiments();
  } catch(e) { alert('Error: ' + e.message); }
}

async function compareSelected() {
  if (selectedExps.size < 2) { alert('Select at least 2 experiments to compare'); return; }
  const ids = [...selectedExps].join(',');
  try {
    const data = await api(`/api/v1/compare?ids=${ids}`);
    const section = document.getElementById('compare-section');
    section.classList.remove('hidden');
    section.innerHTML = '<h2 style="color:var(--accent);margin-bottom:12px">Comparison</h2><div class="compare-row">' +
      data.experiments.map(exp => `
        <div class="compare-card">
          <h3>#${exp.id} ${esc(exp.name)}</h3>
          <div><span style="color:var(--text-dim)">Model:</span> ${esc(exp.model || '-')}</div>
          <div><span style="color:var(--text-dim)">Total:</span> ${exp.total_results}</div>
          <div><span style="color:var(--text-dim)">Solved:</span> <span style="color:var(--green)">${exp.solved}</span></div>
          <div><span style="color:var(--text-dim)">Rate:</span> <span style="color:var(--accent)">${(exp.solve_rate * 100).toFixed(1)}%</span></div>
        </div>
      `).join('') + '</div>';
  } catch(e) { alert('Error: ' + e.message); }
}

// ---- Results ----
async function populateExpSelect(selectId, typeFilter) {
  try {
    let qs = '?limit=200';
    if (typeFilter) qs += `&type=${typeFilter}`;
    const data = await api('/api/v1/experiments' + qs);
    const select = document.getElementById(selectId);
    const cur = select.value;
    select.innerHTML = '<option value="">Select...</option>' +
      data.experiments.map(e => `<option value="${e.id}">#${e.id} ${esc(e.name)}</option>`).join('');
    if (cur) select.value = cur;
  } catch(e) {}
}

async function loadResults() {
  const expId = document.getElementById('res-exp-select').value;
  if (!expId) return;
  const instance = document.getElementById('res-filter-instance').value;
  const reward = document.getElementById('res-filter-reward').value;
  let qs = `?limit=${RES_LIMIT}&offset=${resOffset}`;
  if (instance) qs += `&instance_id=${encodeURIComponent(instance)}`;
  if (reward !== '') qs += `&reward=${reward}`;
  try {
    const data = await api(`/api/v1/experiments/${expId}/results${qs}`);
    renderResults(data);
  } catch(e) {
    document.getElementById('results-tbody').innerHTML =
      `<tr><td colspan="5" class="error">${e.message}</td></tr>`;
  }
}

function renderResults(data) {
  const total = data.total;
  const solved = data.results.filter(r => r.reward > 0).length;
  document.getElementById('results-stats').innerHTML = `
    <div class="stat-card"><div class="label">Total</div><div class="value accent">${total}</div></div>
    <div class="stat-card"><div class="label">This Page Solved</div><div class="value green">${solved}</div></div>
  `;
  document.getElementById('results-tbody').innerHTML = data.results.map(r => `
    <tr>
      <td>${esc(r.instance_id)}</td>
      <td>${esc(r.repo || '-')}</td>
      <td class="${r.reward > 0 ? 'reward-1' : 'reward-0'}">${r.reward}</td>
      <td>${esc(r.termination_reason || '-')}</td>
      <td>${r.sample_idx}</td>
    </tr>
  `).join('');
  document.getElementById('res-page-info').textContent =
    `${resOffset + 1}-${resOffset + data.results.length} of ${total}`;
}

function resPage(dir) {
  resOffset = Math.max(0, resOffset + dir * RES_LIMIT);
  loadResults();
}

// ---- Trajectories ----
async function loadTrajectories() {
  const expId = document.getElementById('traj-exp-select').value;
  if (!expId) return;
  const instance = document.getElementById('traj-filter-instance').value;
  let qs = `?limit=${TRAJ_LIMIT}&offset=${trajOffset}`;
  if (instance) qs += `&instance_id=${encodeURIComponent(instance)}`;
  try {
    const data = await api(`/api/v1/experiments/${expId}/trajectories${qs}`);
    renderTrajectoryList(data.trajectories, expId);
  } catch(e) {
    document.getElementById('traj-list').innerHTML = `<div class="error">${e.message}</div>`;
  }
}

function renderTrajectoryList(trajs, expId) {
  document.getElementById('traj-list').innerHTML = trajs.map(t => `
    <div class="traj-item" onclick="loadTrajectoryDetail(${expId}, ${t.id}, this)">
      <div>
        <div class="iid">${esc(t.instance_id)}</div>
        <div class="meta">Steps: ${t.n_steps || '?'} | ${t.termination_reason || '-'}</div>
      </div>
      <span class="${t.reward > 0 ? 'reward-1' : 'reward-0'}">${t.reward != null ? t.reward : '?'}</span>
    </div>
  `).join('') || '<div class="loading">No trajectories found</div>';
}

async function loadTrajectoryDetail(expId, tid, el) {
  document.querySelectorAll('.traj-item').forEach(e => e.classList.remove('active'));
  if (el) el.classList.add('active');
  const viewer = document.getElementById('traj-viewer');
  viewer.innerHTML = '<div class="loading">Loading...</div>';
  try {
    const data = await api(`/api/v1/experiments/${expId}/trajectories/${tid}`);
    const messages = data.messages || [];
    viewer.innerHTML = messages.map(m => {
      const role = m.role || 'unknown';
      const cls = role === 'system' ? 'msg-system' : role === 'user' ? 'msg-user' : 'msg-assistant';
      const content = typeof m.content === 'string' ? m.content : JSON.stringify(m.content, null, 2);
      return `<div class="msg ${cls}">
        <div class="msg-role ${role}">${role}</div>
        <div class="msg-content">${esc(content)}</div>
      </div>`;
    }).join('') || '<div class="loading">No messages</div>';
  } catch(e) {
    viewer.innerHTML = `<div class="error">${e.message}</div>`;
  }
}

// ---- Localization ----
async function loadLocalization() {
  const expId = document.getElementById('loc-exp-select').value;
  if (!expId) return;
  try {
    const data = await api(`/api/v1/experiments/${expId}/localization`);
    renderLocalization(data);
  } catch(e) {
    document.getElementById('loc-aggregate').innerHTML = '<div class="loading">No localization data available for this experiment.</div>';
    document.getElementById('loc-tbody').innerHTML = '';
  }
}

function renderLocalization(data) {
  const agg = data.aggregate || {};
  document.getElementById('loc-aggregate').innerHTML = Object.entries(agg).map(([k, v]) => `
    <div class="stat-card">
      <div class="label">${esc(k)}</div>
      <div class="value accent">${typeof v === 'number' ? v.toFixed(3) : v}</div>
    </div>
  `).join('') || '<div class="loading">No aggregate data</div>';

  const instances = data.per_instance || [];
  document.getElementById('loc-tbody').innerHTML = instances.slice(0, 200).map(inst => `
    <tr>
      <td>${esc(inst.instance_id || inst.uid || '-')}</td>
      <td>${inst.tracked != null ? (inst.tracked ? 'Yes' : 'No') : '-'}</td>
      <td>${inst.score != null ? inst.score.toFixed(3) : '-'}</td>
      <td style="font-size:11px;color:var(--text-dim)">${esc(JSON.stringify(inst).slice(0, 120))}</td>
    </tr>
  `).join('') || '<tr><td colspan="4" class="loading">No per-instance data</td></tr>';
}

// ---- Helpers ----
function esc(s) {
  if (!s) return '';
  const d = document.createElement('div');
  d.textContent = String(s);
  return d.innerHTML;
}
function formatDate(s) {
  if (!s) return '-';
  return s.replace('T', ' ').slice(0, 16);
}

// ---- Boot ----
loadExperiments();
</script>
</body>
</html>
